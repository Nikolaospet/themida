name: Release draft

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  draft:
    name: Draft release notes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate release notes and draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # GitHub generates release notes from merged PRs since the last tag.
          # We post the notes into a draft so a human can review before publishing.
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --generate-notes
