title = "Themida gitleaks config"

# Inherit the upstream rule set; we only add allowlist rules below.
[extend]
useDefault = true

[allowlist]
description = "Ignore placeholder examples in docs and tests"

# These paths are documentation, test fixtures, and rule-pack definitions —
# any PEM-shaped or token-shaped string in them is a deliberate placeholder
# illustrating a violation/fix, not a real secret. Real secrets land in
# `.env.local`, which is gitignored.
paths = [
  '''docs/.*''',
  '''.*\.test\.ts$''',
  '''.*\.test\.tsx$''',
  '''evals/.*''',
  '''src/lib/rules/frameworks/.*/rules/.*\.ts$''',
]
